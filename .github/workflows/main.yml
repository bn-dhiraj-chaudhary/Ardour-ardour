name: Run Python Script Pipeline

# Triggers the workflow on push or pull request events for the main branch, or manually
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows you to manually trigger the pipeline from the GitHub UI

jobs:
  execute-script:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code onto the runner
    - name: Checkout repository code
      uses: actions/checkout@v4

    # Step 2: Set up the Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.11' # Specify your preferred Python version

    # Step 3: Install dependencies if a requirements file exists
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 4: Run your Python script
    - name: Execute Python script
      run: python main.py
  
    - name: Polaris Code Scanner
      uses: sukot1/polaris-codescanner@v0.01
