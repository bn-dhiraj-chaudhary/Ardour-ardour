capture:
  build:
    clean-command: 'mvn -B -f pom.xml clean'
    build-command: 'mvn -B -f pom.xml install'
  files:
    exclude-regex: '(node_modules|bower_components|vendor)'
analyze:
  cov-analyze-args:
    - '--webapp-security'
    - '--security'
    - '--concurrency'
    - '--enable'
    - 'HARDCODED_CREDENTIALS'
    - '--enable'
    - 'ORM_LOST_UPDATE'
