capture:
  build:
    clean-command: ''
    build-command: ''
  config:
    language: python
  files:
    exclude-regex: '(node_modules|bower_components|vendor)'
analyze:
  cov-analyze-args:
    - '--webapp-security'
    - '--security'
    - '--concurrency'
    - '--enable'
    - 'HARDCODED_CREDENTIALS'
    - '--enable'
    - 'ORM_LOST_UPDATE'
